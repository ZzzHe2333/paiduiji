<html>
<head>
    <meta charset="utf-8">
    <title>排队姬控制台</title>
</head>
<body>
    <div id="startup-splash" class="startup-splash" aria-live="polite">
        <div class="splash-grid"></div>
        <div class="splash-card">
            <p class="splash-title">系统启动提示</p>
            <p class="splash-message">该软件是免费软件，如果收费购买（亲手帮安装除外），请立刻退款！</p>
            <p id="startup-countdown" class="splash-countdown">即将进入控制台...</p>
        </div>
    </div>

    <p id="status" hidden></p>
    <p id="popularity" hidden></p>

    <div id="app" class="panel">
        <h3>PDJ 配置面板</h3>
        <div class="row">
            <label>直播间号</label>
            <input v-model.trim="form.roomid" type="number" placeholder="例如：26714219" />
        </div>
        <div class="row">
            <label>UID</label>
            <input v-model.trim="form.uid" type="number" placeholder="例如：18461303" />
        </div>
        <div class="row">
            <label>Cookie</label>
            <textarea v-model.trim="form.cookie" rows="3" placeholder="粘贴 Bilibili Cookie（至少包含 SESSDATA）"></textarea>
        </div>
        <div class="actions">
            <button @click="saveConfig">保存配置</button>
            <button @click="readLocalCookie">读取当前页面 Cookie</button>
            <span class="hint">{{ statusText }}</span>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    form: { roomid: '', uid: '', cookie: '' },
                    statusText: '等待初始化...',
                    splashSeconds: 5
                }
            },
            async mounted() {
                await this.loadConfig();
                this.playStartupSplash();
                window.addEventListener('pdj:status', (e) => {
                    const d = e.detail || {};
                    this.statusText = `状态: ${d.status || 'unknown'}${d.roomid ? ' / 房间 ' + d.roomid : ''}`;
                });
            },
            methods: {
                async loadConfig() {
                    try {
                        const res = await fetch('/api/config');
                        const cfg = await res.json();
                        this.form.roomid = cfg.roomid || '';
                        this.form.uid = cfg.uid || '';
                        this.form.cookie = cfg.cookie || '';
                        const cfgSeconds = Number(cfg?.ui?.startup_splash_seconds);
                        this.splashSeconds = Number.isFinite(cfgSeconds) ? Math.max(0, cfgSeconds) : 5;
                        this.statusText = '配置已加载';
                    } catch (e) {
                        this.statusText = '加载失败: ' + e;
                    }
                },
                playStartupSplash() {
                    const splash = document.getElementById('startup-splash');
                    const countdown = document.getElementById('startup-countdown');
                    if (!splash) return;
                    let remain = Math.ceil(this.splashSeconds);
                    const updateText = () => {
                        if (countdown) {
                            countdown.textContent = remain > 0 ? `${remain}s 后进入控制台...` : '正在进入控制台...';
                        }
                    };
                    updateText();
                    if (remain <= 0) {
                        splash.classList.add('hide');
                        setTimeout(() => splash.remove(), 500);
                        return;
                    }
                    const timer = setInterval(() => {
                        remain -= 1;
                        updateText();
                        if (remain <= 0) {
                            clearInterval(timer);
                        }
                    }, 1000);
                    setTimeout(() => {
                        clearInterval(timer);
                        splash.classList.add('hide');
                        setTimeout(() => splash.remove(), 500);
                    }, this.splashSeconds * 1000);
                },
                async saveConfig() {
                    try {
                        const body = {
                            roomid: Number(this.form.roomid || 0),
                            uid: Number(this.form.uid || 0),
                            cookie: this.form.cookie || ''
                        };
                        const res = await fetch('/api/config', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(body)
                        });
                        if (!res.ok) throw new Error('HTTP ' + res.status);
                        this.statusText = '保存成功，弹幕连接会自动重连';
                    } catch (e) {
                        this.statusText = '保存失败: ' + e;
                    }
                },
                readLocalCookie() {
                    this.form.cookie = document.cookie || '';
                    this.statusText = this.form.cookie ? '已读取当前域 Cookie（若为空请在 B 站页面手动复制）' : '当前域没有 Cookie，请手动粘贴';
                }
            }
        }).mount('#app');
    </script>

    <script src="pako.min.js"></script>
    <script src="myjs.js"></script>

    <div class="wk">
        <div class="vText">
            <div>
                <span> 弹幕：排队+项目 / 取消排队</span>
            </div>
        </div>
        <div id='danmu' class="div"></div>
    </div>

    <style type="text/css">
        body { margin: 0; background: radial-gradient(circle at 20% 20%, #0e2036 0%, #060b14 42%, #020409 100%); color: #eaf6ff; }

        .startup-splash {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(1, 8, 22, 0.94);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: opacity 0.45s ease;
        }
        .startup-splash.hide { opacity: 0; pointer-events: none; }
        .splash-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(73, 190, 255, 0.16) 1px, transparent 1px),
                linear-gradient(90deg, rgba(73, 190, 255, 0.16) 1px, transparent 1px);
            background-size: 38px 38px;
            mask-image: radial-gradient(circle at center, black 30%, transparent 90%);
            animation: pdjGridMove 10s linear infinite;
        }
        @keyframes pdjGridMove {
            from { transform: translateY(0); }
            to { transform: translateY(38px); }
        }
        .splash-card {
            position: relative;
            width: min(860px, calc(100% - 48px));
            border: 1px solid rgba(79, 212, 255, 0.7);
            border-radius: 14px;
            padding: 28px 24px;
            background: linear-gradient(135deg, rgba(7, 31, 56, 0.85), rgba(3, 14, 27, 0.92));
            box-shadow: 0 0 30px rgba(50, 188, 255, 0.25), inset 0 0 30px rgba(24, 111, 152, 0.2);
            text-align: center;
        }
        .splash-title {
            margin: 0 0 14px;
            font-size: 32px;
            letter-spacing: 0.12em;
            font-weight: 700;
            color: #8de6ff;
            text-shadow: 0 0 12px rgba(86, 208, 255, 0.7);
        }
        .splash-message {
            margin: 0;
            font-size: clamp(20px, 2.2vw, 36px);
            font-weight: 700;
            line-height: 1.55;
            color: #ebf8ff;
            text-shadow: 0 0 14px rgba(86, 208, 255, 0.4);
        }
        .splash-countdown {
            margin: 16px 0 0;
            font-size: 16px;
            color: #95c7de;
            letter-spacing: 0.08em;
        }

        .panel { margin: 12px 0; padding: 12px; border: 1px solid #ddd; border-radius: 8px; max-width: 900px; }
        .panel .row { display: flex; align-items: center; margin: 8px 0; gap: 8px; }
        .panel label { width: 90px; font-weight: 600; }
        .panel input, .panel textarea { flex: 1; padding: 6px; }
        .panel .actions { display: flex; align-items: center; gap: 8px; }
        .panel .hint { color: #c8d6e4; }

        .wk{ width: 100%; height: 80%; text-overflow:ellipsis; white-space: nowrap; }
        .div { width: 60%; height: 90%; line-height:1.3; font-size: 50px; font-weight:700; font-style:oblique; float: left; margin-top: 5%; text-align:left; overflow: hidden; text-decoration:underline(to right, rgb(64, 211, 15), rgb(201, 61, 61)); }
        .div span { background: linear-gradient(to right, rgb(247, 247, 247), rgba(255, 255, 255, 0.589)); -webkit-text-stroke: 2px black; -webkit-background-clip: text; color: transparent; }
        .div span.pdj-confirm-pending { animation: pdjPendingBlink 0.8s infinite alternate; filter: brightness(1.35); }
        @keyframes pdjPendingBlink { from { opacity: 1; transform: scale(1); } to { opacity: 0.5; transform: scale(1.02); } }
        .vText { float: left; width: 10%; height: 100%; overflow: hidden; white-space: nowrap; font-weight:900; text-align:center; font-size: 50px; }
        .vText div{ height: 20%; padding-top: 20%; writing-mode:tb-rl; display: inline-block; }
        .vText span { background: linear-gradient( rgb(247, 247, 247), rgba(255, 255, 255, 0.589)); -webkit-text-stroke: 3px black; -webkit-background-clip: text; color: transparent; }
    </style>
</body>
</html>
