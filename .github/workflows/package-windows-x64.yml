name: Package Windows x64

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: '手动输入要发布的标签（示例：v1.0.0）'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows-x64:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: resolve_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ inputs.tag_name }}"
          else
            TAG_NAME="${{ github.ref_name }}"
          fi

          if [[ ! "$TAG_NAME" =~ ^v[0-9A-Za-z._-]+$ ]]; then
            echo "标签格式不合法：$TAG_NAME（需以 v 开头，例如 v1.0.0）"
            exit 1
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build Windows executable (x64)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name bilibili-danmuji `
            --add-data "backend;backend" `
            --add-data "models;models" `
            --add-data "toGUI;toGUI" `
            --add-data "config.yaml;." `
            gui/control_panel.py

      - name: Create release zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package -Force | Out-Null
          Copy-Item dist/bilibili-danmuji.exe package/
          if (Test-Path README.md) { Copy-Item README.md package/ }
          Compress-Archive -Path package/* -DestinationPath bilibili-danmuji-windows-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-danmuji-windows-x64
          path: bilibili-danmuji-windows-x64.zip

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.resolve_tag.outputs.tag_name }}
          commit: ${{ github.sha }}
          name: ${{ steps.resolve_tag.outputs.tag_name }}
          artifacts: bilibili-danmuji-windows-x64.zip
          artifactErrorsFailBuild: true
          allowUpdates: true
          replacesArtifacts: true
          generateReleaseNotes: true
